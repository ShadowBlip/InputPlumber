# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/composite_device_v1.json
# Schema version number
version: 1

# The type of configuration schema
kind: CompositeDevice

# Name of the composite device mapping
name: MSI Claw 7 AI+ A2VM

# Only allow a single source device per composite device of this type.
single_source: false

# Only use this profile if *any* of the given matches match. If this list is
# empty, then the source devices will *always* be checked.
# /sys/class/dmi/id/product_name
matches:
  - dmi_data:
      product_name: "Claw 7 AI+ A2VM"
      sys_vendor: "Micro-Star International Co., Ltd."

# One or more source devices to combine into a single virtual device. The events
# from these devices will be watched and translated according to the key map.
source_devices:
  # Face Extra Buttons
  - group: keyboard
    udev:
      attributes:
        - name: name
          value: "AT Translated Set 2 keyboard"
        - name: phys
          value: "isa0060/serio0/input0"

  # Xinput Gamepad
  - group: gamepad
    udev:
      properties:
        - name: ID_INPUT_JOYSTICK
          value: "1"
      attributes:
        - name: id/vendor
          value: "0db0"
        - name: id/product
          value: "1901"
        - name: phys
          value: "usb-0000:00:14.0-2/input0"

  # Xinput Mkey Extra Buttons
  - group: gamepad
    udev:
      properties:
        - name: ID_INPUT_KEYBOARD
          value: "1"
      attributes:
        - name: id/vendor
          value: "0db0"
        - name: id/product
          value: "1901"
        - name: phys
          value: "usb-0000:00:14.0-2/input2"

  # Dinput Gamepad
  - group: gamepad
    udev:
      properties:
        - name: ID_INPUT_JOYSTICK
          value: "1"
      attributes:
        - name: id/vendor
          value: "0db0"
        - name: id/product
          value: "1902"
        - name: phys
          value: "usb-0000:00:14.0-2/input0"
    capability_map_id: claw1-dinput

  # Dinput Mkey Extra Buttons
  - group: gamepad
    udev:
      properties:
        - name: ID_INPUT_KEYBOARD
          value: "1"
      attributes:
        - name: id/vendor
          value: "0db0"
        - name: id/product
          value: "1902"
        - name: phys
          value: "usb-0000:00:14.0-2/input1"

# Optional configuration for the composite device
options:
  # If true, InputPlumber will automatically try to manage the input device. If
  # this is false, InputPlumber will not try to manage the device unless an
  # external service enables management of the device. Defaults to 'false'
  auto_manage: true

# The target input device(s) to emulate by default
target_devices:
  - xbox-elite
  - mouse
  - keyboard

# The ID of a device event mapping in the 'event_maps' folder
capability_map_id: claw1
