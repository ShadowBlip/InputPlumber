# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/composite_device_v1.json
# Schema version number
version: 1

# The type of configuration schema
kind: CompositeDevice

# Name of the composite device mapping
name: ONEXPLAYER X1

# Only allow a single source device per composite device of this type.
single_source: false

# Only use this profile if *any* of the given matches matches. If this list is
# empty, then the source devices will *always* be checked.
# /sys/class/dmi/id/product_name
matches:
  - dmi_data:
      product_name: ONEXPLAYER X1 A
      sys_vendor: ONE-NETBOOK
  - dmi_data:
      product_name: ONEXPLAYER X1 i
      sys_vendor: ONE-NETBOOK
  - dmi_data:
      product_name: ONEXPLAYER X1 mini
      sys_vendor: ONE-NETBOOK

# One or more source devices to combine into a single virtual device. The events
# from these devices will be watched and translated according to the key map.
source_devices:
  - group: gamepad
    evdev:
      name: Microsoft X-Box 360 pad
      phys_path: usb-0000:c4:00.3-4/input0
      handler: event*
  - group: keyboard
    evdev:
      name: AT Translated Set 2 keyboard
      phys_path: isa0060/serio0/input0
      handler: event*
  - group: keyboard
    evdev:
      name: HID 1a86:fe00
      phys_path: usb-0000:c4:00.3-2.2/input0
      handler: event*
  - group: gamepad
    hidraw:
      vendor_id: 0x1a86
      product_id: 0xfe00
      interface_num: 2
  - group: gamepad
    udev:
      id_vendor: "1a86"
      id_product: "7523"
      interface_number: "00"
      sys_name: "ttyUSB*"
      subsystem: tty
  - group: imu
    iio:
      name: "{i2c-BMI0260:00,i2c-BOSC0260:00,bmi260}"
      mount_matrix:
        x: [0, 1, 0]
        y: [1, 0, 0]
        z: [0, 0, -1]

  # External / docked controllers: joined dock supplies power and 2.4 GHz to the
  # handheld. The gamepad entry is the receiver's XInput-style device; the fe02
  # HID is companion keys on that receiver path. Absent when controllers are
  # attached directly to the unit.
  - group: gamepad
    evdev:
      name: Microsoft X-Box 360 pad
      phys_path: usb-0000:c4:00.3-1.1/input0
      handler: event*
  - group: keyboard
    evdev:
      name: HID 1a86:fe02
      phys_path: usb-0000:c4:00.3-1.2/input0
      handler: event*

# Optional configuration for the composite device
options:
  # If true, InputPlumber will automatically try to manage the input device. If
  # this is false, InputPlumber will not try to manage the device unless an
  # external service enables management of the device. Defaults to 'false'
  auto_manage: true

# The target input device(s) that the virtual device profile can use
target_devices:
  - xbox-elite
  - mouse
  - keyboard

# The ID of a device event mapping in the 'event_maps' folder
capability_map_id: oxp5
