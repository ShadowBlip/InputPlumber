# yaml-language-server: $schema=../schema/composite_device_v1.json
# Schema version number
version: 1

# The type of configuration schema
kind: CompositeDevice

# Name of the composite device mapping
name: Nintendo Co., Ltd. Pro Controller

# Maximum number of source devices per CompositeDevice.
maximum_sources: 6

# Only use this profile if *any* of the given matches matches. If this list is
# empty, then the source devices will *always* be checked.
# /sys/class/dmi/id/product_name
matches: []

# One or more source devices to combine into a single virtual device. The events
# from these devices will be watched and translated according to the key map.
source_devices:
  - group: gamepad
    evdev:
      name: Nintendo Co., Ltd. Pro Controller
      handler: event*
  #- group: imu
  #  evdev:
  #    name: Nintendo Co., Ltd. Pro Controller (IMU)
  - group: led
    udev:
      sys_name: "*057E*2009*:green:player-1"
      subsystem: leds
  - group: led
    udev:
      sys_name: "*057E*2009*:green:player-2"
      subsystem: leds
  - group: led
    udev:
      sys_name: "*057E*2009*:green:player-3"
      subsystem: leds
  - group: led
    udev:
      sys_name: "*057E*2009*:green:player-4"
      subsystem: leds
  - group: led
    udev:
      sys_name: "*057E*2009*:blue:player-5"
      subsystem: leds

# The target input device(s) to emulate by default
target_devices:
  - gamepad #TODO: Nintendo controller target
  - mouse
  - keyboard
