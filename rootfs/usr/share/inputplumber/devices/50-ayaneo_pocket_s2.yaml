version: 1
kind: CompositeDevice
name: AYANEO Pocket S2 (Pro)

maximum_sources: 0
options:
    auto_manage: true

matches:
    - udev:
          sys_path: /sys/firmware/devicetree/base
          attributes:
              - name: compatible
                value: ayaneo,pocket-s2

source_devices:
    # Ayaneo mode
    - group: gamepad
      capability_map_id: dinput_generic
      evdev:
          name: AYANEO Controller
          vendor_id: 4001
          product_id: 0428
          handler: event*
    # Xinput mode
    - group: gamepad
      evdev:
          phys_path: usb-0001:01:00.0-1/input0
          vendor_id: 045e
          product_id: 028e
          handler: event*
    - group: keyboard
      capability_map_id: aya9
      evdev:
          name: AYANEO DEVICE
          vendor_id: 1c4f
          product_id: 0002
          handler: event*

target_devices:
    - xbox-elite
    - keyboard
    - mouse
