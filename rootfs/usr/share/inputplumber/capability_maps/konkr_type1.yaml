# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/capability_map_v1.json
# Schema version number
version: 1

# The type of configuration schema
kind: CapabilityMap

# Name for the device event map
name: KONKR Type 1

# Unique identifier of the capability mapping
id: konkr1

# List of mapped events that are activated by a specific set of activation keys.
mapping:
  - name: LC
    source_events:
      - keyboard: KeyF21
    target_event:
      gamepad:
        button: LeftTop
  - name: RC
    source_events:
      - keyboard: KeyF22
    target_event:
      gamepad:
        button: RightTop
  - name: Quick Access
    source_events:
      - keyboard: KeyF23
    target_event:
      gamepad:
        button: QuickAccess
  - name: Quick Access 2
    source_events:
      - keyboard: KeyLeftCtrl
      - keyboard: KeyF23
    target_event:
      gamepad:
        button: QuickAccess2
  - name: Keyboard
    source_events:
      - keyboard: KeyLeftMeta
      - keyboard: KeyD
    target_event:
      gamepad:
        button: Keyboard
  - name: LeftPaddle2
    source_events:
      - keyboard: KeyL
    target_event:
      gamepad:
        button: LeftPaddle2
  - name: RIghtPaddle2
    source_events:
      - keyboard: KeyR
    target_event:
      gamepad:
        button: RightPaddle2

# List of events to filter from the source devices
filtered_events: []
