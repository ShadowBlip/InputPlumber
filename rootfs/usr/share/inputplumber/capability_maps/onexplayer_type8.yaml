# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/capability_map_v1.json
# Schema version number
version: 1

# The type of configuration schema
kind: CapabilityMap

# Name for the device event map
name: OneXPlayer Type 8

# Unique identifier of the capability mapping
id: oxp8

# Verification (ONEXPLAYER APEX, evtest on HID 1a86:fe00 unless noted):
#   Verified: Turbo (Ctrl+Alt+Meta); KB short (LeftCtrl+Meta+O); Orange short (Meta+G -> Guide).
#   Not verified: Orange long (Meta+D -> QuickAccess2) — no long-press capture yet; chord guessed from F1 oxp7 swap.
#   Not verified: Turbo+Orange (Meta+Sysrq); KB+Orange (RightCtrl+RightAlt+Delete) — copied from oxp7, not tested on Apex.
# Back grip buttons: HID 0x22 = physical right, 0x23 = physical left on Apex.
# Driver reports 0x22 as LeftPaddle1 and 0x23 as RightPaddle1 (matching X1 Mini),
# so swap them here for Apex.

mapping:
  - name: Left Back Paddle
    source_events:
      - gamepad:
          button: LeftPaddle1
    target_event:
      gamepad:
        button: RightPaddle1
  - name: Right Back Paddle
    source_events:
      - gamepad:
          button: RightPaddle1
    target_event:
      gamepad:
        button: LeftPaddle1
  - name: Turbo
    source_events:
      - keyboard: KeyLeftCtrl
      - keyboard: KeyLeftAlt
      - keyboard: KeyLeftMeta
    target_event:
      gamepad:
        button: QuickAccess
  - name: KB (Short Press)
    source_events:
      - keyboard: KeyLeftCtrl
      - keyboard: KeyLeftMeta
      - keyboard: KeyO
    target_event:
      gamepad:
        button: Keyboard
  - name: Orange Button (Short Press)
    source_events:
      - keyboard: KeyLeftMeta
      - keyboard: KeyG
    target_event:
      gamepad:
        button: Guide
  - name: Orange Button (Long Press)
    source_events:
      - keyboard: KeyLeftMeta
      - keyboard: KeyD
    target_event:
      gamepad:
        button: QuickAccess2
  - name: Turbo + Orange Button
    source_events:
      - keyboard: KeyLeftMeta
      - keyboard: KeySysrq
    target_event:
      gamepad:
        button: Screenshot
  - name: KB + Orange Button
    source_events:
      - keyboard: KeyRightCtrl
      - keyboard: KeyRightAlt
      - keyboard: KeyDelete
    target_event:
      keyboard: KeyF13

# List of events to filter from the source devices
filtered_events: []
